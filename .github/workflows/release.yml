name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run generate-icon && npm run build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          name: Kopirovačka ${{ github.ref_name }}
          body: |
            ## Kopirovačka ${{ github.ref_name }}

            ### Inštalácia
            1. Stiahni `Kopirovacka-Setup-*.exe`
            2. Spusti inštalátor
            3. Aplikácia sa spustí automaticky v zásobníku (pravý dolný roh)

            ### Klávesová skratka
            Predvolená skratka: `Ctrl+;`
            Zmeníš ju v nastaveniach aplikácie.
